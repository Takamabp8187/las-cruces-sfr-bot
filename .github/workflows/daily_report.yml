name: Daily Las Cruces SFR Report

on:
  schedule:
    # Runs at 8:00 AM Mountain Time (14:00 UTC, or 15:00 UTC in MDT)
    # Las Cruces is UTC-7 (MDT summer) / UTC-6 (MST winter)
    # Adjust the hour below if needed:
    #   8 AM MDT = 15:00 UTC  -> use "0 15 * * *"
    #   8 AM MST = 14:00 UTC  -> use "0 14 * * *"
    - cron: '0 15 * * *'    # 8:00 AM Mountain Daylight Time

  workflow_dispatch:          # Allow manual runs from GitHub UI

jobs:
  run-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Restore listing state cache
        uses: actions/cache@v4
        with:
          path: state.json
          key: listing-state-${{ runner.os }}
          restore-keys: |
            listing-state-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml python-dotenv

      - name: Run listing search
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: python search_listings.py

      - name: Save listing state cache
        uses: actions/cache/save@v4
        with:
          path: state.json
          key: listing-state-${{ runner.os }}
