name: Daily Las Cruces SFR Report

on:
  schedule:
    # 8:00 AM Mountain Time (UTC-7 in summer, UTC-6 in winter)
    - cron: '0 15 * * *'   # 8:00 AM Mountain Daylight Time

  workflow_dispatch:         # Allow manual runs from GitHub UI

jobs:
  run-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Restore listing state cache
        uses: actions/cache@v4
        with:
          path: state.json
          key: listing-state-${{ runner.os }}
          restore-keys: |
            listing-state-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml python-dotenv

      - name: Run listing search & send email
        env:
          GMAIL_USER:       ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASS:   ${{ secrets.GMAIL_APP_PASS }}
          RECIPIENT_EMAIL:  ${{ secrets.RECIPIENT_EMAIL }}
          SCRAPER_API_KEY:  ${{ secrets.SCRAPER_API_KEY }}
          STATE_FILE:       state.json
        run: python search_listings.py

      - name: Save listing state cache
        uses: actions/cache@v4
        with:
          path: state.json
          key: listing-state-${{ runner.os }}
